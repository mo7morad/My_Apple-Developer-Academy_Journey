<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Watch the screen recording</title>
  <desc id="desc">A preview card for the Final Team HiFi screen recording.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)" />
  <circle cx="1040" cy="140" r="110" fill="#22c55e" opacity="0.12" />
  <circle cx="180" cy="600" r="150" fill="#38bdf8" opacity="0.10" />
  <rect x="120" y="120" width="1040" height="480" rx="32" fill="#0b1220" stroke="#243041" stroke-width="2" filter="url(#shadow)" />
  <rect x="160" y="160" width="960" height="72" rx="20" fill="#111827" />
  <circle cx="204" cy="196" r="10" fill="#ef4444" />
  <circle cx="238" cy="196" r="10" fill="#f59e0b" />
  <circle cx="272" cy="196" r="10" fill="#22c55e" />
  <text x="640" y="294" text-anchor="middle" fill="#e5e7eb" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="54" font-weight="700">Final Team HiFi</text>
  <text x="640" y="348" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">Screen Recording · Click to open the video player</text>
  <circle cx="640" cy="455" r="82" fill="url(#accent)" />
  <polygon points="620,414 620,496 688,455" fill="#ffffff" />
  <text x="640" y="548" text-anchor="middle" fill="#cbd5e1" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" letter-spacing="1.2">VIEW RECORDING</text>
</svg>